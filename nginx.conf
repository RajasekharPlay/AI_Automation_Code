# ── Nginx Reverse Proxy ──
# Serves frontend static files + proxies /api and /ws to backend
# Replicates Vite dev proxy behavior for production

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── SPA fallback ──
    # All non-matched routes serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ──
    # Proxies all /api/* requests to FastAPI backend
    # ── Health check (no /api prefix) ──
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # ── API proxy ──
    # Proxies all /api/* requests to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (generate-script, mcp/auto-explore endpoints)
        proxy_buffering off;
        proxy_cache off;

        # Long timeout for script generation (up to 5 min)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Large request bodies (Excel upload)
        client_max_body_size 50m;
    }

    # ── WebSocket proxy ──
    # Proxies /ws/* for live log streaming
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket alive for 24 hours
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
